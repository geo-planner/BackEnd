<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GeoPlanner</title>
</head>
<body>
    <h1>GeoPlanner</h1>
    {% if user.is_authenticated %}
        <p>Cześć, {{ user.username }}!</p>
        <a href="{% url 'logout' %}">Wyloguj</a>
    {% else %}
        <a href="{% url 'login' %}">Zaloguj</a> |
        <a href="{% url 'register' %}">Zarejestruj</a>
    {% endif %}
</body>
</html>
